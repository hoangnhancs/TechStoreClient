# .github/workflows/fly-deploy.yml
name: Fly Deploy
on:
  push:
    branches:
      - main
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy Fly App
        working-directory: ./server # 👈 đây là quan trọng nhất
        run: flyctl deploy --remote-only --config fly.toml --app server-proud-fire-4566
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
